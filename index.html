<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTECHAI Solutions IA — Votre partenaire digital africain</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#C8940A;--gold-light:#F5C842;--gold-dark:#8B6508;
    --black:#0A0A0A;--dark:#111111;--dark2:#1A1A1A;--dark3:#222222;
    --white:#F5F0E8;--gray:#888;--green:#25D366;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--black);color:var(--white);font-family:'DM Sans',sans-serif;overflow-x:hidden;}
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(10,10,10,0.9);backdrop-filter:blur(20px);border-bottom:1px solid #C8940A20;}
  .nav-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.25rem;color:var(--gold-light);text-decoration:none;}
  .nav-logo span{color:var(--white);}
  .nav-links{display:flex;gap:2rem;list-style:none;}
  .nav-links a{color:var(--gray);text-decoration:none;font-size:14px;transition:color 0.2s;}
  .nav-links a:hover{color:var(--white);}
  @media(max-width:768px){.nav-links{display:none;}}
  .hero{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:6rem 2rem 4rem;background:radial-gradient(ellipse at 50% 0%,#C8940A18 0%,transparent 70%),var(--black);position:relative;overflow:hidden;}
  .hero::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 80px,#C8940A08 80px,#C8940A08 81px),repeating-linear-gradient(90deg,transparent,transparent 80px,#C8940A08 80px,#C8940A08 81px);}
  .hero-badge{display:inline-flex;align-items:center;gap:8px;background:#C8940A18;border:1px solid #C8940A40;border-radius:100px;padding:6px 16px;font-size:12px;font-family:'Syne',sans-serif;letter-spacing:2px;text-transform:uppercase;color:var(--gold-light);margin-bottom:2rem;}
  .hero-title{font-family:'Syne',sans-serif;font-size:clamp(3rem,10vw,7rem);font-weight:800;line-height:0.9;margin-bottom:1.5rem;}
  .hero-title .gold{color:var(--gold-light);}
  .hero-title .outline{-webkit-text-stroke:2px var(--gold);color:transparent;}
  .hero-sub{font-size:clamp(1rem,2vw,1.25rem);color:var(--gray);max-width:600px;line-height:1.7;margin-bottom:2.5rem;}
  .hero-buttons{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;}
  .stats{display:flex;gap:3rem;flex-wrap:wrap;justify-content:center;margin-top:4rem;}
  .stat{text-align:center;}
  .stat-num{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold-light);}
  .stat-label{font-size:12px;color:var(--gray);margin-top:4px;}
  .btn-primary{background:var(--gold);color:var(--black);border:none;border-radius:100px;padding:14px 32px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;transition:all 0.3s;}
  .btn-primary:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 12px 40px #C8940A40;}
  .btn-wa{background:var(--green);color:#fff;border:none;border-radius:100px;padding:14px 32px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;text-decoration:none;transition:all 0.3s;}
  .btn-wa:hover{transform:translateY(-2px);box-shadow:0 12px 40px #25D36640;}
  .btn-outline{background:transparent;color:var(--white);border:1px solid #444;border-radius:100px;padding:14px 32px;font-family:'Syne',sans-serif;font-weight:600;font-size:14px;cursor:pointer;text-decoration:none;transition:all 0.3s;}
  .btn-outline:hover{border-color:var(--gold);color:var(--gold);}
  .ticker-wrap{background:var(--gold);padding:10px 0;overflow:hidden;white-space:nowrap;}
  .ticker-inner{display:inline-block;animation:ticker 25s linear infinite;}
  .ticker-item{display:inline-block;padding:0 3rem;font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--black);letter-spacing:1px;text-transform:uppercase;}
  @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  section{padding:6rem 2rem;max-width:1200px;margin:0 auto;}
  .section-label{font-family:'Syne',sans-serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:1rem;}
  .section-title{font-family:'Syne',sans-serif;font-size:clamp(2rem,5vw,3.5rem);font-weight:800;line-height:1.1;margin-bottom:1rem;}
  .section-sub{color:var(--gray);font-size:1.1rem;max-width:600px;line-height:1.7;margin-bottom:3rem;}
  .divider{height:1px;background:linear-gradient(90deg,transparent,#C8940A30,transparent);margin:0 2rem;}
  .saas-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:1.5rem;}
  .saas-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:20px;padding:2rem;transition:all 0.3s;position:relative;overflow:hidden;text-decoration:none;color:inherit;display:block;}
  .saas-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--gold-light));}
  .saas-card:hover{border-color:#C8940A40;transform:translateY(-4px);box-shadow:0 20px 60px #00000060;}
  .saas-icon{width:52px;height:52px;border-radius:14px;background:#C8940A18;border:1px solid #C8940A30;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:1.5rem;}
  .saas-badge{display:inline-block;background:#C8940A15;border:1px solid #C8940A30;color:var(--gold-light);border-radius:100px;padding:3px 10px;font-size:11px;font-family:'Syne',sans-serif;letter-spacing:1px;margin-bottom:1rem;}
  .saas-title{font-family:'Syne',sans-serif;font-size:1.3rem;font-weight:700;margin-bottom:0.75rem;}
  .saas-desc{color:var(--gray);font-size:14px;line-height:1.7;margin-bottom:1.5rem;}
  .saas-link{display:inline-flex;align-items:center;gap:6px;color:var(--gold-light);font-size:13px;font-weight:600;font-family:'Syne',sans-serif;text-decoration:none;}
  .ebooks-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:1.5rem;}
  .ebook-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:16px;overflow:hidden;transition:all 0.4s;cursor:pointer;}
  .ebook-card:hover{border-color:#C8940A50;transform:translateY(-6px);box-shadow:0 24px 60px #00000070;}
  .book-3d-wrapper{height:190px;display:flex;align-items:center;justify-content:center;padding:16px;perspective:600px;}
  .book-3d{width:110px;height:155px;position:relative;transform-style:preserve-3d;transform:rotateY(-25deg) rotateX(5deg);transition:transform 0.4s ease;}
  .ebook-card:hover .book-3d{transform:rotateY(-12deg) rotateX(3deg) scale(1.05);}
  .book-front{position:absolute;width:110px;height:155px;border-radius:2px 8px 8px 2px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center;box-shadow:4px 4px 20px rgba(0,0,0,0.6);}
  .book-spine{position:absolute;left:-16px;width:16px;height:155px;border-radius:2px 0 0 2px;transform-origin:right center;transform:rotateY(90deg) translateZ(-8px);display:flex;align-items:center;justify-content:center;}
  .book-spine-text{transform:rotate(-90deg);font-family:'Syne',sans-serif;font-size:8px;font-weight:700;color:rgba(255,255,255,0.6);white-space:nowrap;letter-spacing:1px;}
  .book-icon{font-size:2rem;margin-bottom:6px;}
  .book-title-3d{font-family:'Syne',sans-serif;font-weight:800;font-size:9px;line-height:1.3;color:rgba(255,255,255,0.95);text-shadow:0 1px 3px rgba(0,0,0,0.5);}
  .book-gtechai{font-size:7px;color:rgba(255,255,255,0.4);margin-top:5px;font-family:'Syne',sans-serif;letter-spacing:1px;}
  .ebook-body{padding:1rem;}
  .ebook-cat{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);font-family:'Syne',sans-serif;margin-bottom:0.4rem;}
  .ebook-title{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;margin-bottom:0.4rem;line-height:1.4;}
  .ebook-footer{display:flex;align-items:center;justify-content:space-between;margin-top:0.75rem;}
  .ebook-price{font-family:'Syne',sans-serif;font-weight:800;font-size:1rem;color:var(--gold-light);}
  .ebook-price span{font-size:10px;font-weight:400;color:var(--gray);}
  .btn-buy{background:var(--gold);color:var(--black);border:none;border-radius:100px;padding:7px 14px;font-family:'Syne',sans-serif;font-weight:700;font-size:11px;cursor:pointer;transition:all 0.2s;}
  .btn-buy:hover{background:var(--gold-light);}
  .creative-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;}
  .creative-card{background:var(--dark2);border:1px solid #2a2a2a;border-radius:16px;padding:1.5rem;text-align:center;transition:all 0.3s;cursor:pointer;}
  .creative-card:hover{border-color:#C8940A40;transform:translateY(-4px);}
  .creative-icon{font-size:2.5rem;margin-bottom:1rem;}
  .creative-title{font-family:'Syne',sans-serif;font-weight:700;font-size:14px;margin-bottom:0.5rem;}
  .creative-desc{color:var(--gray);font-size:12px;line-height:1.6;}
  .cta-section{background:linear-gradient(135deg,#C8940A15,#C8940A05);border:1px solid #C8940A30;border-radius:28px;padding:4rem 2rem;text-align:center;}
  .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;align-items:center;justify-content:center;padding:1rem;}
  .modal.open{display:flex;}
  .modal-box{background:var(--dark2);border:1px solid #C8940A40;border-radius:24px;padding:2.5rem;max-width:460px;width:100%;position:relative;}
  .modal-close{position:absolute;top:1rem;right:1rem;background:#333;border:none;color:var(--white);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;}
  .modal-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:0.5rem;line-height:1.4;}
  .modal-price{font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;color:var(--gold-light);margin-bottom:1.5rem;}
  .modal-methods{display:flex;flex-direction:column;gap:0.75rem;margin-bottom:1.5rem;}
